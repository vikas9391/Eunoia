{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Reset Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'css/forgotpassword.css' %}" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #4b774b, #82a982);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #f7faf7;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h2 {
      font-size: 28px;
      color: #111827;
      margin-bottom: 15px;
    }

    p {
      color: #333;
      font-size: 16px;
      line-height: 1.6;
    }

    a.login-link {
  display: block;
  margin-top: 25px;
  padding: 12px;
  background-color: #4b774b;
  color: white;
  font-weight: bold;
  border-radius: 10px;
  text-decoration: none !important; /* ✅ force removes underline */
  transition: background-color 0.3s ease;
}

a.login-link:hover {
  background-color: #3a5f3a;
  text-decoration: none !important; /* also ensure no underline on hover */
}

    
  </style>
</head>
<body>
  <div class="card">
    <h2>Password Reset Successful</h2>
    <p>Your password has been set. You can now log in with your new password.</p>
    <a href="{% url 'login_page' %}" class="login-link">Back to Login</a>
  </div>
</body>
</html>
