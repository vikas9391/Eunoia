{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Eunoia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      input:focus {
        border-color: #5ab584 !important;
        background: #fff !important;
        outline: none;
      }
      button[type="submit"]:hover {
        box-shadow: 0 8px 25px rgba(58,125,92,0.4);
        transform: translateY(-1px);
      }
      .back-btn:hover { color: #1a4a2e !important; }
    </style>
  </head>
  <body style="margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#f0f7f4;">

    <!-- Background -->
    <div style="position:fixed;inset:0;background:linear-gradient(145deg,#e8f5ee 0%,#f0f7f4 50%,#e0f0e8 100%);z-index:0;"></div>
    <div style="position:fixed;top:-120px;right:-80px;width:500px;height:500px;border-radius:50%;background:rgba(90,181,132,0.12);z-index:1;pointer-events:none;"></div>
    <div style="position:fixed;bottom:-150px;left:-100px;width:450px;height:450px;border-radius:50%;background:rgba(58,125,92,0.08);z-index:1;pointer-events:none;"></div>

    <!-- Nav -->
    <nav style="position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:22px 48px;background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(58,125,92,0.1);">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="{% url 'index' %}" style="text-decoration:none;display:flex;align-items:center;gap:12px;">
          <img src="{% static 'images/Eunoia_Logo (1).png' %}" alt="Eunoia" width="48" height="48" style="border-radius:11px;box-shadow:0 4px 12px rgba(58,125,92,0.3);"/>
          <span style="font-size:20px;font-weight:600;color:#1a4a2e;letter-spacing:0.2px;">Eunoia</span>
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:28px;">
        <a href="{% url 'login_page' %}" style="font-size:15px;color:#4a7c5f;text-decoration:none;font-weight:500;">Sign in</a>
        <a href="{% url 'signup_page' %}" style="font-size:15px;color:#fff;text-decoration:none;font-weight:500;background:linear-gradient(135deg,#3a7d5c,#5ab584);padding:10px 24px;border-radius:9px;box-shadow:0 2px 10px rgba(58,125,92,0.25);">Sign up</a>
      </div>
    </nav>

    <!-- Main -->
    <main style="position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
      <div style="width:100%;max-width:420px;">

        <!-- Header -->
        <div style="text-align:center;margin-bottom:36px;">
          <div style="width:68px;height:68px;background:linear-gradient(135deg,#3a7d5c,#5ab584);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 28px rgba(58,125,92,0.25);">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <h1 style="font-size:30px;font-weight:600;color:#1a4a2e;margin-bottom:8px;letter-spacing:-0.3px;">Forgot Password?</h1>
          <p style="font-size:16px;color:#6b9e82;line-height:1.5;">No worries! Enter your email and we'll send you reset instructions.</p>
        </div>

        <!-- Card -->
        <div style="background:#fff;border-radius:20px;padding:44px 40px;box-shadow:0 4px 40px rgba(58,125,92,0.1);border:1px solid rgba(58,125,92,0.08);">

          <!-- Back button -->
          <button class="back-btn" onclick="window.history.back()"
            style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:#6b9e82;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;margin-bottom:28px;padding:0;transition:color 0.2s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back to login
          </button>

          <form method="POST" action="{% url 'password_reset' %}">
            {% csrf_token %}

            <div style="margin-bottom:20px;">
              <label for="email" style="display:block;font-size:13px;font-weight:600;color:#4a7c5f;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:9px;">Email address</label>
              <div style="position:relative;display:flex;align-items:center;">
                <svg style="position:absolute;left:16px;width:18px;height:18px;stroke:#a8c9b8;pointer-events:none;" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <input type="email" name="email" id="email" placeholder="you@example.com" required
                  style="width:100%;padding:14px 16px 14px 48px;background:#f8fdf9;border:1.5px solid #d4ead9;border-radius:11px;color:#1a4a2e;font-size:16px;font-family:'Inter',sans-serif;transition:all 0.2s;"
                  onfocus="this.style.borderColor='#5ab584';this.style.background='#fff'"
                  onblur="this.style.borderColor='#d4ead9';this.style.background='#f8fdf9'"/>
              </div>
            </div>

            <button type="submit"
              style="width:100%;padding:15px;background:linear-gradient(135deg,#2d6b4a,#4a9e70);border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(58,125,92,0.3);letter-spacing:0.2px;transition:all 0.2s;">
              Send Reset Link
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
          </form>

          {% if messages %}
          <div style="margin-top:20px;">
            {% for message in messages %}
            <div style="font-size:14px;padding:12px 16px;border-radius:9px;margin-bottom:9px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;">
              {{ message }}
            </div>
            {% endfor %}
          </div>
          {% endif %}

          <p style="text-align:center;font-size:14px;color:#8ab89a;margin-top:24px;">
            Remember your password? <a href="{% url 'login_page' %}" style="color:#3a7d5c;text-decoration:none;font-weight:600;">Sign in</a>
          </p>

        </div>
      </div>
    </main>

  </body>
</html>
